<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chat</title>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-[#0f172a] to-[#020617] text-white">

    <div class="flex items-center justify-center h-screen p-4">

        <div
            class="w-full max-w-4xl h-[90vh] bg-[#020617]/90 backdrop-blur-xl rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-gray-800">

            <div class="flex items-center justify-between px-6 py-4 bg-gradient-to-r from-indigo-600 to-purple-600">
                <div>
                    <h1 class="font-bold text-lg">Chatting Room</h1>
                </div>
                <div class="flex items-center gap-2 text-sm">
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    <span id="online">0 online</span>
                </div>
            </div>

            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-[#020617]"></div>

            <div class="px-4 py-3 border-t border-gray-800 bg-[#020617]">

                <div class="flex items-center gap-3">

                    <div class="flex-1 relative">
                        <textarea id="input" rows="1"
                            class="w-full resize-none bg-[#020617] border border-gray-700 rounded-xl px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                            placeholder="Type a message..."></textarea>
                    </div>

                    <button id="send"
                        class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 transition px-6 py-3 rounded-xl font-semibold shadow-md">
                        Send
                    </button>

                </div>


            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
